services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tradebench
      - SYNC_DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/tradebench
      - REDIS_URL=redis://cache:6379
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

  streamer:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    command: python Streamers/binance_streamer.py
    environment:
      - REDIS_URL=redis://cache:6379
    depends_on:
      cache:
        condition: service_started
    restart: always

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.prod
    ports:
      - "5173:80"
    depends_on:
      - backend

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradebench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradebench"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: